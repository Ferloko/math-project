<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPCAS | Galería</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="logo.png" type="image/png">
</head>
<body>
    <!-- Navegación -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <img src="logo.png" width="50" height="50" alt="">
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="informacion.html" class="nav-link">Información</a></li>
                <li><a href="cronologia.html" class="nav-link">Cronología</a></li>
                <li><a href="galeria.html" class="nav-link active">Galería</a></li>
                <li><a href="contacto.html" class="nav-link">Contacto</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Header de Página -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">Galería de Actividades</h1>
            <p class="page-subtitle">Un recorrido visual por nuestros momentos más importantes y celebraciones</p>
        </div>
    </section>

    <!-- Sección Galería -->
    <section id="galeria" class="section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">En construcción</h2>
            </div>

            <!-- Galería Principal -->
            <div class="gallery-grid">
               <h2 style="text-align: center;"></h2>
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <span class="lightbox-close">&times;</span>
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-caption">
                <h3 id="lightbox-title"></h3>
                <p id="lightbox-description"></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Club de Matematicas IPCAS. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="likes-manager.js"></script>
    <script src="script.js"></script>
</body>
