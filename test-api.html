<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Likes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-btn { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>Test de API Likes</h1>
    
    <button class="test-btn" onclick="testAPI()">Probar API</button>
    <button class="test-btn" onclick="testCORS()">Probar CORS</button>
    <button class="test-btn" onclick="testLike()">Probar Like</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:3001/api';
        
        function addResult(message, isSuccess = true) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isSuccess ? 'success' : 'error'}`;
            div.innerHTML = message;
            results.appendChild(div);
        }
        
        async function testAPI() {
            try {
                const response = await fetch(`${API_BASE}/likes`);
                const data = await response.json();
                addResult(`✅ API funcionando: ${JSON.stringify(data)}`, true);
            } catch (error) {
                addResult(`❌ Error API: ${error.message}`, false);
            }
        }
        
        async function testCORS() {
            try {
                const response = await fetch(`${API_BASE}/likes`, {
                    method: 'HEAD',
                    mode: 'cors'
                });
                addResult(`✅ CORS OK: Status ${response.status}`, true);
            } catch (error) {
                addResult(`❌ Error CORS: ${error.message}`, false);
            }
        }
        
        async function testLike() {
            try {
                const response = await fetch(`${API_BASE}/likes/test-image.jpg`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                addResult(`✅ Like agregado: ${JSON.stringify(data)}`, true);
            } catch (error) {
                addResult(`❌ Error Like: ${error.message}`, false);
            }
        }
    </script>
</body>
</html>
